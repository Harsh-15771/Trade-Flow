name: Trade Flow CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-and-build:
    name: Run Tests and Verify Docker Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies & Run Backend Tests
        run: |
          cd backend
          npm install
          npm test

      - name: Install Dependencies & Run Dashboard Tests
        run: |
          cd dashboard
          npm install
          npm test -- --watchAll=false

      - name: Verify Docker Build (Backend)
        run: docker compose build backend

      - name: Verify Docker Build (Frontend)
        run: docker compose build frontend

      - name: Verify Docker Build (Dashboard)
        run: docker compose build dashboard

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Tag and Push Images to DockerHub
        run: |
          docker tag trade-flow-backend ${{ secrets.DOCKER_USERNAME }}/trade-flow-backend:latest
          docker tag trade-flow-frontend ${{ secrets.DOCKER_USERNAME }}/trade-flow-frontend:latest
          docker tag trade-flow-dashboard ${{ secrets.DOCKER_USERNAME }}/trade-flow-dashboard:latest
          
          docker push ${{ secrets.DOCKER_USERNAME }}/trade-flow-backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/trade-flow-frontend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/trade-flow-dashboard:latest
