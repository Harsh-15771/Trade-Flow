services:
  backend:
    build: ./backend
    ports:
      - "3002:3002"
    env_file:
      - ./backend/.env
    networks:
      - tradeflow-net

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    networks:
      - tradeflow-net
    depends_on:
      - backend

  dashboard:
    build: ./dashboard
    ports:
      - "3001:80"
    networks:
      - tradeflow-net
    depends_on:
      - backend

networks:
  tradeflow-net:
    driver: bridge
