services:
  backend:
    build: ./backend
    ports:
      - "3002:3002"
    env_file:
      - ./backend/.env
    networks:
      - tradeflow-net

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_BACKEND_URL: ${REACT_APP_BACKEND_URL:-http://localhost:3002}
        REACT_APP_DASHBOARD_URL: ${REACT_APP_DASHBOARD_URL:-http://localhost:3001}
    ports:
      - "3000:80"
    networks:
      - tradeflow-net
    depends_on:
      - backend

  dashboard:
    build:
      context: ./dashboard
      args:
        REACT_APP_BACKEND_URL: ${REACT_APP_BACKEND_URL:-http://localhost:3002}
        REACT_APP_FRONTEND_URL: ${REACT_APP_FRONTEND_URL:-http://localhost:3000}
    ports:
      - "3001:80"
    networks:
      - tradeflow-net
    depends_on:
      - backend

networks:
  tradeflow-net:
    driver: bridge
